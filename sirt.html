<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Image Viewer</title>
<link rel="stylesheet" href="https://pro.fontawesome.com/releases/v5.10.0/css/all.css" />


<style>
body{
  margin:0;
  font-family: Arial;
  background:#f2f2f2;
}
button{
background:#2563eb;
  height:30px;
  color:white;
  width: 25%;
    margin-left:10px;
    margin-top:10px;
    border-radius:20%;
}
button:hover{
    background:#1d4ed8; 
   
}
.img{
width:40px;
height:40px;
margin-top:10px;
margin-left:10px;
border-radius:50%;
}

/* Main container */
.container{
  max-width:400px;
  margin:auto;
  padding:10px;
}

/* Top Big Image */
.main-image{
  width:100%;
  height:400px;
  background:#fff;
  border-radius:10px;
  overflow:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
}

.main-image img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* Bottom Scroll Images */
.thumbnail-container{
  margin-top:10px;
  display:flex;
  gap:10px;
  overflow-x:auto;
  padding-bottom:5px;
}
.thumbnail-container::-webkit-scrollbar{
  display:none;
}
.thumbnail{
  min-width:80px;
  height:80px;
  border-radius:8px;
  overflow:hidden;
  border:2px solid transparent;
  cursor:pointer;
}


.thumbnail img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.thumbnail.active{
  border:2px solid red;
}
.but{
background:#2563eb;
  height:30px;
  color:white;
  width: 25%;
    margin-left:140px;
    margin-top:50px;
    border-radius:20%;
}
.but:hover{
    background:#1d4ed8; 
   
}

</style>
<a href="my first website.html"><button>Home</button></a>
<div class="container">
    
  <div class="main-image">
    <img id="bigImage" src="3.jpg">
    
     </div>

  <!-- Bottom Scroll Thumbnails -->
  <div class="thumbnail-container">

    <div class="thumbnail active">
      <img src="3.jpg">
          </div>

    <div class="thumbnail">
      <img src="11.jpg">
    </div>

    <div class="thumbnail">
      <img src="12.jpg">
    </div>

    <div class="thumbnail">
      <img src="13.jpg">
    </div>

    <div class="thumbnail">
      <img src="14.jpg">
    </div>
  </div>

</div>
<a href="sirt2.html"><button> << preview</button></a>
<a href="sirt3.html"><button class="but">Naxt>></button>
<script>
const thumbnails = document.querySelectorAll(".thumbnail");
const bigImage = document.getElementById("bigImage");

thumbnails.forEach(thumb => {
  thumb.addEventListener("click", () => {

    // Remove active class
    thumbnails.forEach(t => t.classList.remove("active"));

    // Add active to clicked
    thumb.classList.add("active");

    // Change big image
    bigImage.src = thumb.querySelector("img").src;
  });
});
</script>

</body>
</html>
